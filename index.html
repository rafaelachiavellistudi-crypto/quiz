    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    #root { min-height: 100vh; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
      width: 100%; max-width: 680px; overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,245,160,0.05);
      animation: fadeUp 0.5s ease both;

    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .splash { padding:60px 48px; text-align:center; animation:fadeIn 0.6s ease both; }
    .splash-icon { font-size:64px; margin-bottom:24px; display:block; filter:drop-shadow(0 0 20px rgba(0,245,160,0.4)); }
    .splash h1 {

      line-height:1.1; margin-bottom:16px;
      background:linear-gradient(135deg,#00f5a0,#00d9f5,#a78bfa);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .splash p { color:var(--muted); font-size:16px; line-height:1.6; margin-bottom:40px; max-width:420px; margin-left:auto; margin-right:auto; }
    .splash-stats { display:flex; justify-content:center; gap:32px; margin-bottom:40px; }
    .stat { text-align:center; }
    .stat-n { font-family:'Clash Display',sans-serif; font-size:28px; font-weight:700; color:var(--accent); display:block; }
    .stat-l { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
    .btn {

      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#080b12; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; border:none; cursor:pointer;
      transition:transform 0.2s ease,box-shadow 0.2s ease; letter-spacing:0.02em;

    .btn:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(0,245,160,0.3); }
    .btn:active { transform:translateY(0); }
    .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
    .progress-bar { height:3px; background:var(--surface2); }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width 0.4s ease; border-radius:0 2px 2px 0; }

    .q-num { font-size:12px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.12em; }
    .q-counter { font-size:13px; color:var(--muted); }

    .options { display:grid; gap:10px; }
    .option {

    .adapt-text { font-size:12px; color:#a78bfa; }

    .result-icon { font-size:48px; display:block; margin-bottom:16px; }

    .section-title { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-bottom:14px; font-weight:700; }

    .genre-row { display:flex; align-items:center; gap:14px; }
    .genre-label { font-size:13px; font-weight:700; min-width:88px; }
    .genre-bar-wrap { flex:1; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
    .genre-bar { height:100%; border-radius:4px; transition:width 1s ease; }
    .genre-pct { font-size:12px; font-weight:700; color:var(--accent); min-width:36px; text-align:right; }
    .profiles { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:28px; }
    .profile-chip { padding:10px 16px; border-radius:50px; border:1.5px solid var(--border); background:var(--surface2); font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; }
    .profile-chip.top { border-color:rgba(0,245,160,0.4); background:rgba(0,245,160,0.08); color:var(--accent); }
    .recs { display:grid; gap:14px; margin-bottom:28px; }
    .rec-card { border:1px solid var(--border); border-radius:16px; overflow:hidden; }
    .rec-header { padding:14px 18px; display:flex; align-items:center; gap:12px; }
    .rec-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .rec-genre { font-weight:700; font-size:14px; }
    .rec-pct { margin-left:auto; font-size:13px; color:var(--accent); font-weight:700; }
    .rec-body { padding:0 18px 16px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .rec-col h5 { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
    .rec-col ul { list-style:none; }
    .rec-col li { font-size:13px; color:var(--text); padding:3px 0; border-bottom:1px solid var(--border); }
    .rec-col li:last-child { border:none; }
    .result-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    @media (max-width:560px) {
      .splash,.question-wrap,.result-wrap { padding:28px 24px; }
      .adapt-hint { margin:0 24px 16px; }
      .rec-body { grid-template-columns:1fr; }
      .splash-stats { gap:20px; }

</head>

        { text:"🧠 Só se precisar memorizar a letra", tags:["letra","popular","vocal"], scores:{sertanejo:2,pop:2} },
      ]},
      { id:50, text:"No final, música boa é aquela que:", type:"final", options:[
        { text:"❤️ Te faz sentir algo profundo", tags:["emocional","profundidade","catarse"], scores:{mpb:3,indie:2,rock:2} },
        { text:"💃 Te coloca em movimento", tags:["danca","ritmo","energia"], scores:{funk:3,eletronica:2,pop:2} },
        { text:"🧠 Te faz pensar e questionar", tags:["reflexao","profundidade","autoral"], scores:{jazz:3,mpb:2,indie:2} },
        { text:"🔥 Te dá aquela adrenalina incrível", tags:["adrenalina","intensidade","poder"], scores:{metal:3,rock:2,trap:2} },
      ]},
    ];

    function selectQuestions(allQuestions, currentTags) {
      const selected = [];
      const usedIds = new Set();
      const initials = allQuestions.filter(q => q.type === "initial");
      initials.slice(0, 3).forEach(q => { selected.push(q); usedIds.add(q.id); });
      const sortedTags = Object.entries(currentTags).sort((a, b) => b[1] - a[1]);
      const topTags = sortedTags.slice(0, 3).map(([tag]) => tag);
      topTags.forEach(tag => {
        const tagQ = allQuestions.filter(q => q.type === `tag:${tag}` && !usedIds.has(q.id));
        if (tagQ.length > 0) {
          const pick = tagQ[Math.floor(Math.random() * tagQ.length)];
          selected.push(pick); usedIds.add(pick.id);
        }
      });
      const remaining = allQuestions.filter(q =>
        !usedIds.has(q.id) && ["misc","personality","emotional","fun","final"].includes(q.type)
      ).sort(() => Math.random() - 0.5);
      while (selected.length < 15 && remaining.length > 0) {
        const next = remaining.pop();
        selected.push(next); usedIds.add(next.id);
      }
      return selected.slice(0, 15);
    }

    function calculateResults(answers) {
      const genreScores = {};
      const tagCounts = {};
      Object.keys(GENRES).forEach(g => { genreScores[g] = 0; });
      answers.forEach(answer => {
        Object.entries(answer.scores).forEach(([genre, pts]) => {
          genreScores[genre] = (genreScores[genre] || 0) + pts;
        });
        answer.tags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
      });
      const total = Object.values(genreScores).reduce((a, b) => a + b, 0) || 1;
      const percentages = {};
      Object.entries(genreScores).forEach(([g, score]) => {
        percentages[g] = Math.round((score / total) * 100);
      });
      const topGenres = Object.entries(percentages)
        .filter(([, pct]) => pct > 5)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);
      const profileScores = {};
      Object.entries(PROFILES).forEach(([pid, profile]) => {
        let score = 0;
        profile.tags.forEach(tag => { score += (tagCounts[tag] || 0); });
        profileScores[pid] = score;
      });
      const topProfiles = Object.entries(profileScores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([pid]) => pid);
      const desc = generateDescription(topGenres, topProfiles, tagCounts);
      const recommendations = topGenres.slice(0, 3).map(([genre]) => ({ genre, data: GENRES[genre] }));
      return { percentages, topGenres, topProfiles, tagCounts, recommendations, description: desc };
    }

    function generateDescription(topGenres, topProfiles, tagCounts) {
      const top1 = topGenres[0]?.[0];
      const top2 = topGenres[1]?.[0];
      const p1 = PROFILES[topProfiles[0]];
      const g1 = GENRES[top1];
      const g2 = top2 ? GENRES[top2] : null;
      let desc = `Você possui um perfil musical ${p1?.label?.toLowerCase() || "único"} e autêntico. `;
      if (g1) desc += `Sua essência está no ${g1.label}`;
      if (g2) desc += `, com fortes influências de ${g2.label}`;
      desc += ". ";
      if (tagCounts["emocional"] > 1 || tagCounts["letra"] > 1) desc += "As letras falam direto ao seu coração. ";
      if (tagCounts["danca"] > 1 || tagCounts["festa"] > 1) desc += "Você vive para a pista de dança. ";
      if (tagCounts["intensidade"] > 1 || tagCounts["adrenalina"] > 1) desc += "Música para você é adrenalina pura. ";
      if (tagCounts["introspectivo"] > 1 || tagCounts["reflexao"] > 1) desc += "Você usa a música como ferramenta de autoconhecimento. ";
      return desc.trim();
    }

    function MusicQuiz() {
      const [phase, setPhase] = useState("splash");
      const [questions, setQuestions] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [selected, setSelected] = useState(null);
      const [currentTags, setCurrentTags] = useState({});
      const [results, setResults] = useState(null);
      const [adaptLabel, setAdaptLabel] = useState(null);
      const [animKey, setAnimKey] = useState(0);

      const startQuiz = () => {
        const qs = selectQuestions(ALL_QUESTIONS, {});
        setQuestions(qs); setCurrentIdx(0); setAnswers([]); setSelected(null);
        setCurrentTags({}); setResults(null); setAdaptLabel(null); setPhase("quiz");
      };

      const handleNext = () => {
        if (!selected) return;
        const newAnswers = [...answers, selected];
        const newTags = { ...currentTags };
        selected.tags.forEach(t => { newTags[t] = (newTags[t] || 0) + 1; });
        setCurrentTags(newTags);
        if (currentIdx + 1 >= questions.length) {
          setAnswers(newAnswers); setPhase("loading");
          setTimeout(() => { setResults(calculateResults(newAnswers)); setPhase("result"); }, 1800);
        } else {
          const nextQ = questions[currentIdx + 1];
          setAnswers(newAnswers);
          setAdaptLabel(nextQ.type.startsWith("tag:") ? nextQ.type.replace("tag:", "") : null);
          setCurrentIdx(prev => prev + 1); setSelected(null); setAnimKey(k => k + 1);
        }
      };

      const progress = questions.length > 0 ? (currentIdx / questions.length) * 100 : 0;

      return (
        <div className="app">
          <div className="card">
            {phase === "splash" && (
              <div className="splash">
                <span className="splash-icon">🎵</span>
                <h1>Qual é o seu DNA Musical?</h1>
                <p>Responda 15 perguntas e descubra seu perfil musical, com recomendações personalizadas de artistas e músicas.</p>
                <div className="splash-stats">
                  <div className="stat"><span className="stat-n">15</span><span className="stat-l">Perguntas</span></div>
                  <div className="stat"><span className="stat-n">10</span><span className="stat-l">Gêneros</span></div>
                  <div className="stat"><span className="stat-n">50+</span><span className="stat-l">Músicas</span></div>
                </div>
                <button className="btn" onClick={startQuiz}>🚀 Descobrir meu perfil</button>
              </div>
            )}

            {phase === "quiz" && questions.length > 0 && (
              <>
                <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}} /></div>
                {adaptLabel && (
                  <div className="adapt-hint">
                    <div className="adapt-dot" />
                    <span className="adapt-text">🧠 IA adaptando: pergunta baseada nas suas respostas → {adaptLabel}</span>
                  </div>
                )}
                <div className="question-wrap" key={animKey}>
                  <div className="q-meta">
                    <span className="q-num">Pergunta {currentIdx + 1}</span>
                    <span className="q-counter">{currentIdx + 1} / {questions.length}</span>
                  </div>
                  <div className="q-text">{questions[currentIdx].text}</div>
                  <div className="options">
                    {questions[currentIdx].options.map((opt, i) => (
                      <button key={i} className={`option${selected === opt ? " selected" : ""}`} onClick={() => setSelected(opt)}>
                        <span className="option-emoji">{opt.text.slice(0, 2)}</span>
                        <span>{opt.text.slice(2).trim()}</span>
                      </button>
                    ))}
                  </div>
                  <div style={{marginTop:24,display:"flex",justifyContent:"flex-end"}}>
                    <button className="btn" onClick={handleNext} disabled={!selected}>
                      {currentIdx + 1 === questions.length ? "Ver Resultado ✨" : "Próxima →"}
                    </button>
                  </div>
                </div>
              </>
            )}

            {phase === "loading" && (
              <div style={{padding:"80px 40px",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:20,animation:"pulse 1s ease infinite"}}>🎧</div>
                <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:20,fontWeight:600,marginBottom:8}}>Analisando seu perfil...</div>
                <div style={{color:"var(--muted)",fontSize:14}}>Calculando compatibilidade musical</div>
                <div style={{marginTop:32,display:"flex",justifyContent:"center",gap:8}}>
                  {[0,1,2].map(i => (
                    <div key={i} style={{width:8,height:8,borderRadius:"50%",background:"var(--accent)",animation:`pulse 1s ease ${i*0.2}s infinite`}} />
                  ))}
                </div>
              </div>
            )}

            {phase === "result" && results && (
              <div className="result-wrap">
                <div className="result-header">
                  <span className="result-icon">🎵</span>
                  <div className="result-title">Seu Perfil Musical</div>
                  <p className="result-desc">{results.description}</p>
                </div>
                <div style={{marginBottom:28}}>
                  <div className="section-title">Compatibilidade Musical</div>
                  <div className="genres-list">
                    {results.topGenres.map(([genre, pct]) => (
                      <div key={genre} className="genre-row">
                        <span className="genre-label">{GENRES[genre]?.label}</span>
                        <div className="genre-bar-wrap">
                          <div className="genre-bar" style={{width:`${pct}%`,background:`linear-gradient(90deg,${GENRES[genre]?.color}99,${GENRES[genre]?.color})`}} />
                        </div>
                        <span className="genre-pct">{pct}%</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:28}}>
                  <div className="section-title">Seus Perfis</div>
                  <div className="profiles">
                    {results.topProfiles.map((pid, i) => (
                      <div key={pid} className={`profile-chip${i === 0 ? " top" : ""}`}>
                        <span>{PROFILES[pid]?.icon}</span><span>{PROFILES[pid]?.label}</span>
                      </div>
                    ))}
                  </div>
                  <p style={{fontSize:13,color:"var(--muted)",lineHeight:1.5}}>{PROFILES[results.topProfiles[0]]?.desc}</p>
                </div>
                <div style={{marginBottom:32}}>
                  <div className="section-title">Artistas & Músicas Recomendadas</div>
                  <div className="recs">
                    {results.recommendations.map(({genre,data}) => (
                      <div key={genre} className="rec-card" style={{borderColor:`${data.color}30`}}>
                        <div className="rec-header" style={{background:`${data.color}10`}}>
                          <div className="rec-dot" style={{background:data.color}} />
                          <span className="rec-genre">{data.label}</span>
                          <span className="rec-pct">{results.percentages[genre]}%</span>
                        </div>
                        <div className="rec-body">
                          <div className="rec-col">
                            <h5>Artistas</h5>
                            <ul>{data.artists.slice(0,4).map(a => <li key={a}>{a}</li>)}</ul>
                          </div>
                          <div className="rec-col">
                            <h5>Músicas</h5>
                            <ul>{data.songs.slice(0,4).map(s => <li key={s}>{s}</li>)}</ul>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="result-actions">
                  <button className="btn" onClick={startQuiz}>🔄 Refazer Quiz</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MusicQuiz />);
  </script>
</body>
</html>
